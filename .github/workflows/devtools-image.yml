name: devtools-image

on:
  push:
    branches: [main]
    paths:
      - docker/devtools.Dockerfile
      - scripts/build_devtools_image.sh
      - .github/workflows/devtools-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/devtools.Dockerfile
          push: true
          tags: |
            ghcr.io/bndos/devtools:emacs31-ubuntu22.04
          build-args: |
            DEVTOOLS_BASE_IMAGE=ubuntu:22.04
